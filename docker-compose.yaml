version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: growmetrics_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: growmetrics_redis
    restart: always
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: growmetrics_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: growmetrics_backend
    ports:
    - "1323:1323"  # <--- Diese Zeile MUSS rein!
    env_file:
      - .env
    restart: always
    environment:
      - REDIS_ADDR=redis:6379
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      # Falls du MQTT im Container nutzt, füge hier die Variablen hinzu:
      - MQTT_BROKER=${MQTT_BROKER}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
